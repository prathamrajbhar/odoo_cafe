<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-md">
<!-- Logo Area -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Odoo POS</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">High-Performance Hospitality</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl border border-available-border p-8 shadow-[0px_4px_12px_rgba(0,0,0,0.05)]">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute inset-y-0 left-0 pl-3 flex items-center text-outline pointer-events-none">mail</span>
<input class="block w-full pl-10 pr-3 py-3 border border-available-border rounded-DEFAULT bg-surface-bright text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md transition-colors" id="email" name="email" placeholder="Enter your email" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute inset-y-0 left-0 pl-3 flex items-center text-outline pointer-events-none">lock</span>
<input class="block w-full pl-10 pr-3 py-3 border border-available-border rounded-DEFAULT bg-surface-bright text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md transition-colors" id="password" name="password" placeholder="Enter your password" required="" type="password">
</div>
</div>
<!-- Actions -->
<div class="pt-2">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-3 px-4 rounded-DEFAULT hover:bg-surface-tint active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
<!-- Secondary Links -->
<div class="flex items-center justify-between pt-4 border-t border-surface-variant mt-6">
<a class="font-label-md text-label-md text-secondary hover:text-on-secondary-container transition-colors" href="#">Forgot Password?</a>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Sign Up</a>
</div>
</form>
</div>
<!-- Footer / Context -->
<div class="text-center mt-8 text-on-surface-variant font-body-sm text-body-sm">
<p>© 2024 Odoo S.A. All rights reserved.</p>
</div>
