<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Signup - Odoo POS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#714b67",
                        "on-tertiary": "#ffffff",
                        "occupied-pink": "#FFF0F3",
                        "tertiary": "#34451e",
                        "warning": "#FFC107",
                        "secondary-fixed": "#95f1f8",
                        "available-bg": "#FFFFFF",
                        "on-surface": "#191c1d",
                        "on-primary-container": "#f0bfe0",
                        "on-secondary-container": "#006e73",
                        "on-secondary-fixed-variant": "#004f53",
                        "danger": "#DC3545",
                        "on-error": "#ffffff",
                        "secondary-container": "#92eff5",
                        "on-primary-fixed-variant": "#5f3b56",
                        "on-primary-fixed": "#2f1029",
                        "surface-tint": "#79526f",
                        "secondary": "#00696e",
                        "surface-container-high": "#e7e8e9",
                        "surface-bright": "#f8f9fa",
                        "on-surface-variant": "#4e444a",
                        "tertiary-container": "#4b5d33",
                        "tertiary-fixed": "#d5eab4",
                        "on-tertiary-fixed-variant": "#3b4c24",
                        "primary-fixed": "#ffd7f1",
                        "background": "#f8f9fa",
                        "secondary-fixed-dim": "#78d5db",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f3f4f5",
                        "surface-dim": "#d9dadb",
                        "error-container": "#ffdad6",
                        "occupied-text": "#D63384",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#c0d5a0",
                        "tertiary-fixed-dim": "#b9ce9a",
                        "outline": "#80747a",
                        "on-primary": "#ffffff",
                        "surface-container": "#edeeef",
                        "surface-variant": "#e1e3e4",
                        "available-border": "#DEE2E6",
                        "inverse-on-surface": "#f0f1f2",
                        "on-background": "#191c1d",
                        "inverse-surface": "#2e3132",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#57344f",
                        "surface-container-highest": "#e1e3e4",
                        "outline-variant": "#d1c3ca",
                        "success": "#28A745",
                        "surface": "#f8f9fa",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#112000",
                        "on-secondary-fixed": "#002022",
                        "primary-fixed-dim": "#e9b8d9",
                        "inverse-primary": "#e9b8d9"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        unit: "4px",
                        "container-max": "1440px",
                        "margin-mobile": "16px",
                        "gutter": "16px",
                        "margin-desktop": "24px"
                    },
                    fontFamily: {
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "mono-label": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-lg": ["Inter"]
                    },
                    fontSize: {
                        "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "600" }],
                        "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "26px", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "display-lg": ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "mono-label": ["13px", { lineHeight: "18px", letterSpacing: "0.03em", fontWeight: "500" }],
                        "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "600" }],
                        "label-lg": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center font-body-md antialiased p-4">
<!-- Transactional Page - No Navigation Shells Rendered -->
<main class="w-full max-w-md">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-primary font-bold tracking-tight">Odoo POS</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Create your account to get started.</p>
</div>
<!-- Signup Form Container (Level 1 Surface) -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-sm">
<form action="#" class="space-y-6" method="POST">
<!-- Name Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="name">Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-bright text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors font-body-md text-body-md placeholder-on-surface-variant/50" id="name" name="name" placeholder="Full Name" required="" type="text">
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-bright text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors font-body-md text-body-md placeholder-on-surface-variant/50" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-bright text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors font-body-md text-body-md placeholder-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2">Must be at least 8 characters.</p>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-lg text-label-lg text-on-primary bg-primary hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]" type="submit">
                    Sign Up
                </button>
</form>
<!-- Divider -->
<div class="mt-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center font-body-sm text-body-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant">Or continue with</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="w-full inline-flex justify-center py-2 px-4 border border-outline-variant rounded-lg shadow-sm bg-surface-bright font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors" type="button">
                        Google
                    </button>
<button class="w-full inline-flex justify-center py-2 px-4 border border-outline-variant rounded-lg shadow-sm bg-surface-bright font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors" type="button">
                        Microsoft
                    </button>
</div>
</div>
</div>
<!-- Links -->
<p class="mt-8 text-center font-body-sm text-body-sm text-on-surface-variant">
            Already have an account? 
            <a class="font-label-md text-label-md text-primary hover:text-surface-tint hover:underline transition-colors" href="#">Log in</a>
</p>
</main>
</body></html>
